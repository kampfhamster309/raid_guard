services:

  capture-agent:
    build: ./services/capture-agent
    env_file: .env
    environment:
      FRITZ_HOST: ${FRITZ_HOST}
      FRITZ_USER: ${FRITZ_USER}
      FRITZ_PASSWORD: ${FRITZ_PASSWORD}
      FRITZ_IFACE_ID: ${FRITZ_IFACE_ID:-3-19}
    volumes:
      - pcap_pipe:/pcap
    networks:
      - raid_guard_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  suricata:
    build: ./services/suricata
    # Placeholder command — replaced with PCAP-file input in RAID-002b
    command: ["tail", "-f", "/dev/null"]
    volumes:
      - pcap_pipe:/pcap:ro
      - suricata_logs:/var/log/suricata
    networks:
      - raid_guard_net
    restart: unless-stopped
    depends_on:
      - capture-agent

  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: ${DB_USER:-raidguard}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-raidguard}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - raid_guard_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-raidguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - raid_guard_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build: ./services/backend
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-raidguard}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-raidguard}
      REDIS_URL: redis://redis:6379
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - raid_guard_net
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./services/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - raid_guard_net
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  raid_guard_net:
    driver: bridge

volumes:
  pcap_pipe:
  suricata_logs:
  postgres_data:
  redis_data:
